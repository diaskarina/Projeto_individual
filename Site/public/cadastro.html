<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Conexão Sertaneja | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css">
  <link rel="icon" href="./assets/icon/Logo.ico">
  <link href="https://fonts.cdnfonts.com/css/angelica-rytes" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Medula+One&family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <div class="logo">
        <a href="index.html"><img src="assets/icon/Logo.png" alt=""></a>
      </div>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>
          <a href="simulador.html">Simulador</a>
        </li>
        <li>
          <img src="assets/imgs/usuario.png" alt="" width="40px" height="auto">
        </li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li>|</li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <h2>Cadastre-se</h2>
      <div class="shape-cadastro"></div>
      <div class="card card-cadastro">
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>CPF:</span>
            <input id="cpf_input" type="text" placeholder="Seu CPF" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="email" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" oninput="analisarSenha()" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <div class="imgSticker">
            <img src="assets/imgs/linhaMusica.png" alt="">
          </div>
          <button class="botao" onclick="cadastrar()"><img src="assets/imgs/buttonPlay.png" alt=""></button>
          <div id="div_mensagem"></div>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  // let listaEmpresasCadastradas = [];

  function cadastrar() {
    //aguardar();
    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var cpfVar = cpf_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      cpfVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }
    if (nomeVar.length < 1) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Nome Inválido)";

      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }
    if (!(emailVar.includes('@') && emailVar.includes('.'))) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Email Inválido)";

    } else {
      setInterval(sumirMensagem, 5000);
    }

    if (senhaVar.length < 6) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Senha Inválida)";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }
    if (confirmacaoSenhaVar !== senhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Senhas não corretas)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }
    if (cpfVar.length !== 11) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(CPF Inválido)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    //For para verificar se é só número
    let valido = true;

    for (let i = 0; i < cpfVar.length; i++) {
      if (cpfVar[i] < '0' || cpfVar[i] > '9') {
        valido = false;
        break;
      }
    }

    if (!valido) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "CPF deve conter apenas números!";
      return false;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        cpfServer: cpfVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }


  function sumirMensagem() {
    cardErro.style.display = "none";
  }

  function analisarSenha() {
  var senhaVar = senha_input.value;
  var tamanho = senhaVar.length;
  var senhaMai = senhaVar.toUpperCase();
  var senhaMin = senhaVar.toLowerCase();
  var forca = 0;

  if (tamanho >= 6) {
    forca++;
  }
  if (senhaVar != senhaMai) {
    forca++;
  }
  if (senhaVar != senhaMin) {
    forca++;
  }

  if (forca == 3) {
    div_mensagem.innerHTML = `<span style="color: green;">Senha forte</span>`;
  } else if (forca == 2) {
    div_mensagem.innerHTML = `<span style="color: orange;">Senha média  <br> 
                               As senha deve possuir: Possuir no mínimo 6 caracteres <br>
                               Conter letras maiúsculas e minúsculas, números e  caracteres especiais (ex: @, #, $, %)    <br></span>`;
  } else {
    div_mensagem.innerHTML = `<span style="color: red;">Senha fraca <br> 
                               As senha deve possuir: Possuir no mínimo 6 caracteres <br>
                               Conter letras maiúsculas e minúsculas, números e  caracteres especiais (ex: @, #, $, %)    <br></span>`;
  }
}

</script>
